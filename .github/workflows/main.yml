name: 'Lint Code'

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run Linter
      run: |
        flake8 server/djangoapp/ --count --select=E9,F63,F7,F82 --show-source --statistics
        echo "Linted Python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install JSHint
      run: npm install jshint --global

    - name: Run Linter
      run: |
        echo '{"esversion": 8, "asi": true, "expr": true, "laxbreak": true}' > .jshintrc
        find ./server/database -name "*.js" -exec jshint --config .jshintrc {} +
        echo "Linted JavaScript files successfully"
