name: CI Linting Engine

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linting:
    name: Code Quality Check (Lint)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    # Setup explicit and correct property keys for Python runtime
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Linting Tool dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # Strictly isolates dynamic testing context paths and applies relaxed layout rules
    - name: Run Flake8 Python Lint Engine
      run: |
        # Stop the build if there are critical errors or syntax bugs
        flake8 server/djangoapp/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero prints dynamic presentation style violations as warnings without crashing the CI
        flake8 server/djangoapp/ --count --exit-zero --max-complexity=10 --max-line-length=79 --statistics

    - name: Set up Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install JSHint Global Framework
      run: npm install -g jshint

    - name: Run JSHint Engine Validation
      run: |
        jshint --extra-ext .js,.jsx --exclude **/node_modules/** . || true